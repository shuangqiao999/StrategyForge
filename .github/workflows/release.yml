name: Release Build (Windows · AVX2/BMI2 · NSIS Installer)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 tag（如 v0.1.1），留空从 pyproject.toml 自动获取"
        required: false
        default: ""
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  get_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 获取版本号
        id: get_version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            VERSION="${TAG#v}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAG="${{ github.ref_name }}"
          else
            VERSION=$(grep -m 1 '^version' pyproject.toml | cut -d'"' -f2)
            TAG="v${VERSION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version: ${VERSION}  tag: ${TAG}"

  create_release:
    needs: get_version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: 创建草稿发布
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get_version.outputs.tag }}
          draft: true
          generate_release_notes: true

  windows_build:
    needs: [create_release, get_version]
    permissions:
      contents: write
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ needs.get_version.outputs.tag }}
      PYTHONOPTIMIZE: 2
      PYTHONHASHSEED: 42
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 显示构建信息
        shell: bash
        run: |
          echo "=========================================="
          echo " StrategyForge  AVX2/BMI2 优化构建"
          echo "=========================================="
          echo " 版本: $RELEASE_TAG"
          echo " Python: 3.11"
          echo " 依赖: kuzu, lancedb, numba, scipy, numpy"
          echo " 输出: StrategyForge_Setup.exe (NSIS)"
          echo "=========================================="

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/strategy-forge/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/strategy-forge/src-tauri -> target
          prefix-key: "release-windows-avx2-bmi2"

      - name: 安装 UPX
        shell: bash
        run: |
          curl -L -o upx.zip https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip
          unzip -o upx.zip
          mkdir -p $HOME/bin && cp upx-4.2.4-win64/upx.exe $HOME/bin/
          echo "$HOME/bin" >> $GITHUB_PATH
          upx --version

      - name: 安装 Python 依赖 (含 numba)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install "pyinstaller>=6.18.0"

      - name: 显示关键依赖版本
        shell: bash
        run: |
          python -c "import numba; print('numba', numba.__version__)"
          python -c "import numpy; print('numpy', numpy.__version__)"
          python -c "import scipy; print('scipy', scipy.__version__)"

      - name: PyInstaller 打包 (AVX2/BMI2)
        env:
          CFLAGS: "-O3 -march=core-avx2 -mtune=core-avx2 -mavx2 -mbmi2 -mfma -mfpmath=sse -pipe -funroll-loops -ftree-vectorize"
          CXXFLAGS: "-O3 -march=core-avx2 -mtune=core-avx2 -mavx2 -mbmi2 -mfma -mfpmath=sse -pipe -funroll-loops -ftree-vectorize"
        run: |
          python -m PyInstaller strategy-forge-backend.spec --noconfirm

      - name: 拷贝 data/rule/ 到 dist
        shell: bash
        run: |
          mkdir -p dist/strategy-forge-backend/data/rule/custom
          cp -r data/rule/rules.json dist/strategy-forge-backend/data/rule/

      - name: 拷入 Tauri 资源目录
        shell: bash
        run: |
          RES="apps/strategy-forge/src-tauri/resources"
          mkdir -p "$RES"
          rm -rf "$RES/strategy-forge-backend"
          cp -r dist/strategy-forge-backend "$RES/strategy-forge-backend"

      - name: 安装前端依赖
        working-directory: apps/strategy-forge
        run: npm ci

      - name: Tauri 构建 (NSIS · AVX2/BMI2)
        working-directory: apps/strategy-forge
        timeout-minutes: 180
        env:
          RUSTFLAGS: "-C target-cpu=core-avx2 -C opt-level=3 -C debuginfo=0 -C target-feature=+avx2,+bmi2,+fma,+sse3,+ssse3,+sse4.1,+sse4.2,+popcnt,+lzcnt"
          CARGO_PROFILE_RELEASE_OPT_LEVEL: "3"
          CARGO_PROFILE_RELEASE_LTO: "thin"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          CARGO_PROFILE_RELEASE_DEBUG: "false"
          CARGO_PROFILE_RELEASE_PANIC: "abort"
        run: npx tauri build --bundles nsis

      - name: 收集安装包
        shell: bash
        run: |
          RELEASE="release"
          rm -rf "$RELEASE"
          mkdir -p "$RELEASE"
          cp apps/strategy-forge/src-tauri/target/release/bundle/nsis/StrategyForge_*_x64-setup.exe "$RELEASE/StrategyForge_Setup.exe"
          echo "产物:"
          ls -lh "$RELEASE"

      - name: 上传安装包到 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "$RELEASE_TAG" release/StrategyForge_Setup.exe --clobber
